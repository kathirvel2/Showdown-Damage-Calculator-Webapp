<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokémon Damage Calculator</title>
  <script
    src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.0/dist/index.global.js"
    integrity="sha384-nWTzRTCY/9V4Bo352ehygr1c4cnst4XN6lMR3fipakEQrhVpc0hEM5Dii3Amz0sT"
    crossorigin="anonymous"
  ></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
  </style>
  <script>
    document.documentElement.classList.toggle(
      'dark',
      window.matchMedia('(prefers-color-scheme: dark)').matches
    );
  </script>
  <link rel="stylesheet" href="styles.css">
  <!-- Official Smogon damage-calc engine (all generations) bundled locally -->
  <script src="smogon-calc.bundle.js"></script>
</head>
<body class="min-h-dvh text-gray-900 dark:text-gray-100 antialiased">
  <div id="app" class="max-w-6xl mx-auto px-3 sm:px-5 py-4 sm:py-6"></div>
  <script src="app.js"></script>
</body>
</html>
